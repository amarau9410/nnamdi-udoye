	<style>
		:root {
			--bg: #f4f1ea;
			--surface: #fffdf8;
			--surface-alt: #efe9dc;
			--text: #1d2a30;
			--muted: #5a6a70;
			--brand: #0b6e5f;
			--brand-dark: #074c41;
			--accent: #d98e04;
			--border: #d9d1c3;
			--shadow: 0 12px 28px rgba(13, 34, 40, 0.11);
			--radius: 20px;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		html {
			scroll-behavior: smooth;
		}

		body {
			font-family: "Manrope", sans-serif;
			color: var(--text);
			line-height: 1.65;
			background:
				radial-gradient(circle at 14% 12%, rgba(217, 142, 4, 0.18), transparent 30%),
				radial-gradient(circle at 88% 28%, rgba(11, 110, 95, 0.17), transparent 34%),
				linear-gradient(160deg, #f8f4ea 0%, #f0ece3 48%, #e8efe8 100%);
			min-height: 100vh;
			text-rendering: optimizeLegibility;
		}

		.grain {
			position: fixed;
			inset: 0;
			pointer-events: none;
			z-index: -1;
			opacity: 0.22;
			background-image: radial-gradient(circle at 1px 1px, rgba(0, 0, 0, 0.08) 1px, transparent 0);
			background-size: 24px 24px;
		}

		.container {
			width: min(1100px, 92%);
			margin: 0 auto;
		}

		header {
			position: sticky;
			top: 0;
			backdrop-filter: blur(12px);
			background: rgba(255, 253, 248, 0.8);
			border-bottom: 1px solid rgba(217, 209, 195, 0.7);
			z-index: 50;
		}

		.nav {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 1rem 0;
			position: relative;
		}

		.brand {
			font-family: "Space Grotesk", sans-serif;
			font-weight: 700;
			letter-spacing: 0.02em;
			color: var(--brand-dark);
			text-decoration: none;
			font-size: 1.1rem;
		}

		nav ul {
			display: flex;
			list-style: none;
			gap: 1.2rem;
			align-items: center;
		}

		.menu-toggle {
			display: none;
			align-items: center;
			justify-content: center;
			padding: 0.45rem 0.65rem;
			border-radius: 10px;
			border: 1px solid var(--border);
			background: #fff;
			color: var(--brand-dark);
			font-weight: 800;
			font-size: 1rem;
			line-height: 1;
			cursor: pointer;
		}

		nav a {
			text-decoration: none;
			color: var(--text);
			font-weight: 600;
			font-size: 0.95rem;
			transition: color 0.2s ease;
		}

		nav a:hover {
			color: var(--brand);
		}

		.btn {
			display: inline-flex;
			align-items: center;
			gap: 0.5rem;
			text-decoration: none;
			border-radius: 999px;
			padding: 0.74rem 1.15rem;
			font-weight: 700;
			transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
			cursor: pointer;
			border: none;
		}

		.btn-primary {
			color: #fff;
			background: linear-gradient(130deg, var(--brand) 0%, #128a77 100%);
			box-shadow: 0 10px 20px rgba(11, 110, 95, 0.24);
		}

		.btn-primary:hover {
			transform: translateY(-2px);
			box-shadow: 0 12px 24px rgba(11, 110, 95, 0.31);
		}

		.btn-secondary {
			color: var(--brand-dark);
			background: rgba(255, 255, 255, 0.7);
			border: 1px solid var(--border);
		}

		.btn-secondary:hover {
			transform: translateY(-2px);
			background: #fff;
		}

		.hero {
			padding: 6rem 0 4.3rem;
			display: grid;
			grid-template-columns: 1.2fr 0.8fr;
			gap: 2rem;
			align-items: center;
		}

		.hero h1 {
			font-family: "Space Grotesk", sans-serif;
			font-size: clamp(2.1rem, 5.2vw, 4.2rem);
			line-height: 1.08;
			margin-bottom: 1.1rem;
			letter-spacing: -0.03em;
		}

		.hero h1 .highlight {
			color: var(--brand);
			display: inline-block;
		}

		.hero p {
			color: var(--muted);
			max-width: 60ch;
			margin-bottom: 1.6rem;
			font-size: 1.05rem;
		}

		.hero-actions {
			display: flex;
			gap: 0.8rem;
			flex-wrap: wrap;
			margin-bottom: 1.4rem;
		}

		.stats {
			display: grid;
			grid-template-columns: repeat(3, minmax(90px, 1fr));
			gap: 0.9rem;
			max-width: 560px;
		}

		.stat-card {
			background: rgba(255, 255, 255, 0.75);
			border: 1px solid var(--border);
			border-radius: 16px;
			padding: 0.9rem;
			box-shadow: var(--shadow);
		}

		.stat-card strong {
			display: block;
			font-size: 1.2rem;
			color: var(--brand-dark);
			line-height: 1.2;
		}

		.stat-card span {
			font-size: 0.9rem;
			color: var(--muted);
		}

		.hero-panel {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			box-shadow: var(--shadow);
			padding: 1.2rem;
			transform: rotate(1.2deg);
		}

		.hero-panel .card {
			background: linear-gradient(150deg, #fcfaf5 0%, #eef3ee 100%);
			border: 1px solid var(--border);
			border-radius: 14px;
			padding: 1rem;
			margin-bottom: 0.8rem;
		}

		.hero-panel h3 {
			font-size: 1rem;
			margin-bottom: 0.2rem;
		}

		.hero-panel p {
			color: var(--muted);
			font-size: 0.92rem;
		}

		section {
			padding: 1.2rem 0 3.2rem;
		}

		.section-heading {
			font-family: "Space Grotesk", sans-serif;
			margin-bottom: 1.15rem;
			font-size: clamp(1.4rem, 3vw, 2rem);
			letter-spacing: -0.02em;
		}

		.about {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 1rem;
		}

		.panel {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			box-shadow: var(--shadow);
			padding: 1.3rem;
		}

		.panel p {
			color: var(--muted);
			margin-bottom: 0.9rem;
		}

		.about-points {
			padding-left: 1.1rem;
			color: var(--muted);
			margin: 0.25rem 0 0.95rem;
		}

		.about-points li {
			margin-bottom: 0.5rem;
		}

		.skills-grid {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 0.7rem;
			list-style: none;
		}

		.skills-grid li {
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 0.6rem 0.75rem;
			font-weight: 600;
			background: #fff;
		}

		.services {
			display: grid;
			grid-template-columns: repeat(3, minmax(0, 1fr));
			gap: 1rem;
		}

		.timeline {
			display: grid;
			gap: 0.9rem;
		}

		.timeline-item {
			background: var(--surface);
			border: 1px solid var(--border);
			border-left: 4px solid var(--brand);
			border-radius: 14px;
			padding: 1rem;
			box-shadow: var(--shadow);
		}

		.timeline-item h3 {
			font-size: 1.05rem;
			margin-bottom: 0.15rem;
			color: var(--brand-dark);
		}

		.timeline-item .meta {
			display: block;
			color: var(--muted);
			font-weight: 600;
			font-size: 0.9rem;
			margin-bottom: 0.45rem;
		}

		.timeline-item ul {
			padding-left: 1.1rem;
			color: var(--muted);
		}

		.timeline-item li {
			margin-bottom: 0.45rem;
		}

		.cert-grid {
			display: grid;
			grid-template-columns: repeat(3, minmax(0, 1fr));
			gap: 0.8rem;
		}

		.cert-card {
			background: linear-gradient(145deg, #fffaf2 0%, #f2f5ef 100%);
			border: 1px solid var(--border);
			border-radius: 14px;
			padding: 0.9rem;
			font-weight: 700;
			color: var(--brand-dark);
		}

		.case-grid {
			display: grid;
			grid-template-columns: repeat(3, minmax(0, 1fr));
			gap: 1rem;
		}

		.case-card {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 16px;
			padding: 1rem;
			box-shadow: var(--shadow);
			transition: transform 0.2s ease, box-shadow 0.2s ease;
		}

		.case-card:hover {
			transform: translateY(-3px);
			box-shadow: 0 15px 30px rgba(13, 34, 40, 0.14);
		}

		.case-kpi {
			display: inline-block;
			margin-bottom: 0.4rem;
			font-weight: 800;
			color: var(--brand);
		}

		.case-card h3 {
			font-size: 1.03rem;
			margin-bottom: 0.35rem;
			color: var(--brand-dark);
		}

		.case-card p {
			color: var(--muted);
			font-size: 0.95rem;
		}

		.service-card {
			background: var(--surface-alt);
			border: 1px solid var(--border);
			border-radius: 16px;
			padding: 1rem;
			transition: transform 0.2s ease, box-shadow 0.2s ease;
		}

		.service-card:hover {
			transform: translateY(-3px);
			box-shadow: 0 14px 28px rgba(13, 34, 40, 0.13);
		}

		.service-card h3 {
			margin-bottom: 0.4rem;
			font-size: 1.05rem;
			color: var(--brand-dark);
		}

		.service-card p {
			color: var(--muted);
			font-size: 0.95rem;
		}

		.contact {
			margin-bottom: 2.2rem;
		}

		.contact-card {
			background: linear-gradient(140deg, #ffffff 0%, #e9f2ef 100%);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			padding: 1.4rem;
			box-shadow: var(--shadow);
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 1rem;
			flex-wrap: wrap;
		}

		.contact-card p {
			color: var(--muted);
			margin-top: 0.25rem;
		}

		.contact-links {
			display: flex;
			gap: 0.7rem;
			flex-wrap: wrap;
		}

		footer {
			border-top: 1px solid rgba(217, 209, 195, 0.8);
			padding: 1.3rem 0 1.6rem;
			color: #55656b;
			font-size: 0.9rem;
		}

		.reveal {
			opacity: 0;
			transform: translateY(18px);
			transition: opacity 0.55s ease, transform 0.55s ease;
		}

		.reveal.show {
			opacity: 1;
			transform: translateY(0);
		}

		@media (max-width: 940px) {
			.hero,
			about {
				grid-template-columns: 1fr;
			}

			.hero-panel {
				transform: none;
			}

			.services {
				grid-template-columns: 1fr 1fr;
			}

			.cert-grid {
				grid-template-columns: 1fr 1fr;
			}

			.case-grid {
				grid-template-columns: 1fr 1fr;
			}
		}

		@media (max-width: 680px) {
			.menu-toggle {
				display: inline-flex;
			}

			nav ul {
				display: none;
				position: absolute;
				top: calc(100% + 8px);
				right: 0;
				width: min(260px, 82vw);
				padding: 0.8rem;
				background: rgba(255, 253, 248, 0.98);
				border: 1px solid var(--border);
				border-radius: 14px;
				box-shadow: var(--shadow);
				flex-direction: column;
				align-items: flex-start;
				gap: 0.7rem;
			}

			nav ul.open {
				display: flex;
			}

			.stats {
				grid-template-columns: 1fr;
			}

			.skills-grid,
			services,
			cert-grid,
			case-grid {
				grid-template-columns: 1fr;
			}

			.hero {
				padding-top: 4.2rem;
			}
		}
	</style>
</head>
